backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/images"
public_folder: "/assets/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home"
        name: "home"
        file: "src/_data/home.json"
        fields:
          - { label: "Hero Headline", name: "hero_headline", widget: "string" }
          - { label: "Hero Subtext", name: "hero_subtext", widget: "string" }
          - { label: "Years in Business", name: "years_in_business", widget: "string" }

      - label: "Collision Repair"
        name: "collision"
        file: "src/_data/collision.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "About Us"
        name: "about"
        file: "src/_data/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Policies & Procedures"
        name: "policies"
        file: "src/_data/policies.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Business Info"
        name: "business"
        file: "src/_data/business.json"
        fields:
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "City / State / ZIP", name: "city", widget: "string" }
          - label: "Hours"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Day(s)", name: "days", widget: "string" }
              - { label: "Hours", name: "hours", widget: "string" }
